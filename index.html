<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site Unavailable</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f8f9fa;
            font-family: Arial, sans-serif;
            text-align: center;
        }

        .message-container {
            max-width: 600px;
        }

        h1 {
            font-size: 3rem;
            color: #343a40;
            margin-bottom: 20px;
        }

        p {
            font-size: 1.25rem;
            color: #6c757d;
        }
    </style>
</head>
<body>
    <div class="message-container">     
        <h1>Temporarily Unavailable</h1>
    </div>
    <script>
        // Example: Countdown Timer
        const countdownElement = document.createElement('p');
        countdownElement.style.fontSize = '1.25rem';
        countdownElement.style.color = '#007bff';
    
        const messageContainer = document.querySelector('.message-container');
        messageContainer.appendChild(countdownElement);
    
        let secondsLeft = 60; // Set time in seconds
        const updateCountdown = () => {
            countdownElement.textContent = `Redirecting in ${secondsLeft} seconds...`;
            if (secondsLeft <= 0) {
                // Redirect to another page or URL
                window.location.href = "https://example.com";
            }
            secondsLeft--;
        };
    
        updateCountdown(); // Initial call
        setInterval(updateCountdown, 500); // Update every second
    </script>   
</body>
</html>
